<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conferência de Manifestos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef1f5;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

.top{
display:flex;
align-items:center;
gap:20px;
}

.logo{
height:45px;
}

h1{
color:#1e4f91;
margin:0;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.uploads{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
background:#f3f4f7;
padding:15px;
border-radius:8px;
flex:1;
}

button{
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.process{
background:#1e73be;
color:white;
}

.excel{
background:#2e9f4b;
color:white;
}

.clear{
background:#7a8798;
color:white;
}

.status{
margin-top:10px;
color:#1e73be;
}

.counts{
display:flex;
gap:20px;
margin:15px 0;
}

.count{
background:#f3f4f7;
padding:10px;
border-radius:6px;
text-align:center;
width:80px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

thead{
background:#1e4f91;
color:white;
}

td,th{
padding:8px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="top">
<img src="logo-azulcargo.png" class="logo">
<h1>Conferência de Manifestos</h1>
</div>

<div class="subtitle">
Manifesto PDF escaneado + EDI Excel + Capa / conferência física
</div>

<div class="uploads">

<div class="box">
<b>Upload Manifestos (PDF)</b><br>
<input type="file" id="manifesto" multiple>
</div>

<div class="box">
<b>Upload Planilha EDI (Excel)</b><br>
<input type="file" id="edi">
</div>

<div class="box">
<b>Upload Capa / Conferência Física</b><br>
<input type="file" id="capa">
</div>

</div>

<button class="process" onclick="processar()">PROCESSAR CONFERÊNCIA</button> <button class="excel" onclick="baixarExcel()">Baixar Excel</button> <button class="clear" onclick="location.reload()">Limpar</button>

<div class="status" id="status"></div>

<div class="counts">

<div class="count">
Manifesto<br>
<b id="manifestoCount">0</b>
</div>

<div class="count">
Emitido<br>
<b id="emitidoCount">0</b>
</div>

<div class="count">
Físico<br>
<b id="fisicoCount">0</b>
</div>

</div>

<table id="tabela">

<thead>
<tr>
<th>NF</th>
<th>Emitido</th>
<th>AWB</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let resultado=[]

function filtrarNF(texto){

let linhas = texto.split("\n")
let coletar=false
let notas=[]

for(let linha of linhas){

linha=linha.trim()

if(linha.match(/NFe|Notas Fiscais/i)){
coletar=true
continue
}

if(coletar){

let match = linha.match(/\b\d{7,10}\b/)

if(match){
notas.push(match[0])
}

}

}

return notas
}

async function extrairNotasPDF(file){

const arrayBuffer = await file.arrayBuffer()
const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise

let notas=[]

for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i)
const viewport = page.getViewport({scale:2})

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise

const img=canvas.toDataURL()

const ocr = await Tesseract.recognize(img,"eng")

const texto=ocr.data.text

const filtradas=filtrarNF(texto)

filtradas.forEach(n=>{
if(!notas.includes(n)){
notas.push(n)
}
})

}

return notas

}

function lerExcel(file){

return new Promise(resolve=>{

const reader=new FileReader()

reader.onload=e=>{

const data=new Uint8Array(e.target.result)
const workbook=XLSX.read(data,{type:"array"})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet)

let mapa={}

json.forEach(l=>{

const nf=String(l.Numero || "").trim()
const awb=String(l["Nº AWB"] || "").trim()

if(nf){
mapa[nf]=awb
}

})

resolve(mapa)

}

reader.readAsArrayBuffer(file)

})

}

async function processar(){

document.getElementById("status").innerText="Processando..."

const pdfs=document.getElementById("manifesto").files
const ediFile=document.getElementById("edi").files[0]

let notasManifesto=[]

for(const file of pdfs){

const notas=await extrairNotasPDF(file)
notasManifesto.push(...notas)

}

notasManifesto=[...new Set(notasManifesto)]

document.getElementById("manifestoCount").innerText=notasManifesto.length

let mapaEDI={}

if(ediFile){
mapaEDI=await lerExcel(ediFile)
}

let emitidos=0

resultado=[]

notasManifesto.forEach(nf=>{

let emitido=false
let awb=""

if(mapaEDI[nf]){
emitido=true
awb=mapaEDI[nf]
emitidos++
}

resultado.push({
nf,
emitido,
awb,
status: emitido ? "OK" : "NÃO EMITIDO"
})

})

document.getElementById("emitidoCount").innerText=emitidos

mostrarTabela()

document.getElementById("status").innerText="Conferência concluída"

}

function mostrarTabela(){

const tbody=document.querySelector("#tabela tbody")
tbody.innerHTML=""

resultado.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.nf}</td>
<td>${r.emitido ? "SIM":"NÃO"}</td>
<td>${r.awb}</td>
<td>${r.status}</td>
`

tbody.appendChild(tr)

})

}

function baixarExcel(){

const ws=XLSX.utils.json_to_sheet(resultado)
const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Relatorio")

XLSX.writeFile(wb,"conferencia.xlsx")

}

</script>

</body>
</html>

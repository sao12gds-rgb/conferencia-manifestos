<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conferência de Manifestos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;}
body{
  font-family:Arial,sans-serif;
  background:#eef1f5;
  margin:0;
  padding:20px;
}
.container{
  max-width:960px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.logo{height:40px;}
h1{color:#1e4f91;margin:6px 0 2px 0;}
.subtitle{color:#666;margin-bottom:20px;font-size:14px;}
.uploads{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.box{
  background:#f3f4f7;
  padding:15px;
  border-radius:8px;
  flex:1;
  min-width:180px;
}
.box b{display:block;margin-bottom:6px;font-size:13px;}
button{
  border:none;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
  margin-right:8px;
  margin-bottom:8px;
}
.process{background:#1e73be;color:white;}
.process:hover{background:#155fa0;}
.excel{background:#2e9f4b;color:white;}
.excel:hover{background:#25803c;}
.clear{background:#7a8798;color:white;}
.clear:hover{background:#5f6b78;}
.counts{display:flex;gap:16px;margin:15px 0;flex-wrap:wrap;}
.count{
  background:#f3f4f7;
  padding:12px 16px;
  border-radius:8px;
  text-align:center;
  min-width:90px;
  font-size:13px;
}
.count b{display:block;font-size:22px;color:#1e4f91;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:#1e4f91;color:white;}
td,th{padding:8px 10px;text-align:left;border-bottom:1px solid #e4e8ee;}
tbody tr:hover{background:#f0f4fb;}
.summary-box{
  background:#f3f4f7;
  padding:14px;
  border-radius:8px;
  margin:10px 0;
  line-height:1.8;
  font-size:14px;
}
.section-title{
  font-weight:bold;
  margin:14px 0 6px 0;
  color:#1e4f91;
  font-size:15px;
}
.status-ok{color:#2e7d32;font-weight:bold;}
.status-warn{color:#c62828;font-weight:bold;}
.search{margin:12px 0;}
select,input[type="text"]{
  padding:8px 10px;
  border:1px solid #bfc7d1;
  border-radius:6px;
  font-size:13px;
}
input[type="text"]{width:300px;}

/* Barra de progresso */
#progressBar{
  display:none;
  margin:12px 0;
}
#progressBar .bar-track{
  background:#dde3ea;
  border-radius:6px;
  height:14px;
  overflow:hidden;
}
#progressBar .bar-fill{
  background:#1e73be;
  height:100%;
  width:0%;
  transition:width 0.2s;
  border-radius:6px;
}
#progressBar .bar-label{
  font-size:12px;
  color:#555;
  margin-top:4px;
}

/* Status */
#status{
  font-size:13px;
  color:#444;
  margin:8px 0;
  min-height:20px;
}

/* Badge de método de extração */
.badge{
  display:inline-block;
  font-size:10px;
  padding:2px 6px;
  border-radius:4px;
  font-weight:bold;
  vertical-align:middle;
  margin-left:4px;
}
.badge-nativo{background:#d4edda;color:#155724;}
.badge-ocr{background:#fff3cd;color:#856404;}

/* Tabela status cores */
.st-ok{color:#2e7d32;font-weight:bold;}
.st-nao{color:#c62828;font-weight:bold;}
.st-dup{color:#e65100;font-weight:bold;}

/* Tooltip debug */
.debug-info{font-size:11px;color:#888;margin-top:4px;white-space:pre-wrap;}
</style>
</head>

<body>
<div class="container">

  <img src="logo-azulcargo.png" class="logo" onerror="this.style.display='none'">
  <h1>Conferência de Manifestos</h1>
  <div class="subtitle">Manifesto PDF + EDI Excel + Capa / Conferência Física</div>

  <div class="uploads">
    <div class="box">
      <b>Cliente</b>
      <select id="cliente">
        <option value="riachuelo">Riachuelo</option>
        <option value="3coracoes">3 Corações</option>
        <option value="generico">Genérico</option>
      </select>
    </div>

    <div class="box">
      <b>Upload Manifestos (PDF)</b>
      <input type="file" id="manifesto" multiple accept=".pdf">
    </div>

    <div class="box">
      <b>Upload Planilha EDI (Excel)</b>
      <input type="file" id="edi" accept=".xls,.xlsx,.csv">
    </div>

    <div class="box">
      <b>Upload Capa / Conferência Física</b>
      <input type="file" id="capa" accept=".pdf,image/*">
    </div>
  </div>

  <div>
    <button class="process" onclick="processar()">&#9654; PROCESSAR CONFERÊNCIA</button>
    <button class="excel" onclick="baixarExcel()">&#8595; Baixar Excel</button>
    <button class="clear" onclick="location.reload()">&#8635; Limpar</button>
  </div>

  <div id="status"></div>

  <div id="progressBar">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="bar-label" id="barLabel"></div>
  </div>

  <div class="counts">
    <div class="count">Manifesto<b id="manifestoCount">0</b></div>
    <div class="count">Emitido<b id="emitidoCount">0</b></div>
    <div class="count">Físico<b id="fisicoCount">0</b></div>
    <div class="count">Divergências<b id="divCount" style="color:#c62828">0</b></div>
  </div>

  <div class="section-title">Resumo Geral</div>
  <div id="resumoGeral" class="summary-box"></div>

  <div class="section-title">Análise</div>
  <div id="analise" class="summary-box"></div>

  <div class="search">
    <input type="text" id="busca" placeholder="Buscar NF, AWB ou status..." onkeyup="filtrar()">
  </div>

  <table id="tabela">
    <thead>
      <tr>
        <th>#</th>
        <th>NF</th>
        <th>Emitido</th>
        <th>AWB</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="debugInfo" class="debug-info"></div>
</div>

<script>
/* ========================================================
   CONFIGURAÇÃO GLOBAL
======================================================== */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

let resultado    = [];
let manifestNFs  = [];
let fisicoTotal  = 0;
let clienteAtual = "riachuelo";
let debugLog     = [];

/* ========================================================
   UTILITÁRIOS GERAIS
======================================================== */
function normalizarNumero(valor){
  if(valor === null || valor === undefined) return "";
  return String(valor).replace(/\D/g, "").trim();
}

function setStatus(msg){ document.getElementById("status").innerText = msg; }

function setProgress(pct, label){
  const bar = document.getElementById("progressBar");
  bar.style.display = "block";
  document.getElementById("barFill").style.width = pct + "%";
  document.getElementById("barLabel").innerText = label || "";
}

function hideProgress(){
  document.getElementById("progressBar").style.display = "none";
}

/* ========================================================
   NORMALIZAÇÃO DE NF POR CLIENTE
======================================================== */
function normalizarNF(nf, cliente){
  nf = String(nf).replace(/\D/g, "").trim();
  if(!nf) return "";

  if(cliente === "3coracoes"){
    // 3 Corações: 8-9 dígitos, PRESERVA zeros à esquerda
    if(nf.length === 8 || nf.length === 9) return nf;
    return "";
  }

  if(cliente === "riachuelo"){
    // Riachuelo: EXATAMENTE 8 dígitos (padrão NFe)
    const semZero = nf.replace(/^0+/, "");
    if(semZero.length === 8) return semZero;
    if(nf.length === 8 || nf.length === 9) return nf.replace(/^0+/, "");
    return "";
  }

  // Genérico: 7-9 dígitos
  const semZero = nf.replace(/^0+/, "");
  if(semZero.length >= 7 && semZero.length <= 9) return semZero;
  return "";
}

/* ========================================================
   EXTRAÇÃO DE TEXTO NATIVO DO PDF (sem OCR)
======================================================== */
async function extrairTextoNativo(pdf){
  let textoTotal = "";
  let paginasComTexto = 0;

  for(let i = 1; i <= pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const items = content.items || [];

    const linhas = {};
    for(const item of items){
      const y = Math.round(item.transform[5]);
      if(!linhas[y]) linhas[y] = [];
      linhas[y].push(item.str || "");
    }

    const ysOrdenados = Object.keys(linhas).map(Number).sort((a,b) => b - a);
    let textoPagina = "";
    for(const y of ysOrdenados){
      textoPagina += linhas[y].join(" ") + "\n";
    }

    if(textoPagina.trim().length > 20) paginasComTexto++;
    textoTotal += textoPagina + "\n";
  }

  if(paginasComTexto < Math.ceil(pdf.numPages / 2)) return null;
  return textoTotal;
}

/* ========================================================
   EXTRAÇÃO VIA OCR (Tesseract)
======================================================== */
async function renderizarPagina(page, scale){
  const viewport = page.getViewport({ scale });
  const canvas   = document.createElement("canvas");
  const ctx      = canvas.getContext("2d");
  canvas.width   = viewport.width;
  canvas.height  = viewport.height;
  await page.render({ canvasContext: ctx, viewport }).promise;
  return canvas;
}

function corrigirOCR(texto){
  return (texto || "")
    .replace(/[|]/g, " ")
    .replace(/[Oo](?=\d)/g, "0")
    .replace(/(?<=\d)[Oo]/g, "0")
    .replace(/[Ss](?=\d)/g, "5")
    .replace(/(?<=\d)[Ss]/g, "5")
    .replace(/[Ii](?=\d)/g, "1")
    .replace(/(?<=\d)[Ii]/g, "1")
    .replace(/[Ll](?=\d)/g, "1")
    .replace(/(?<=\d)[Ll]/g, "1")
    .replace(/[Bb](?=\d)/g, "8")
    .replace(/(?<=\d)[Bb]/g, "8");
}

async function ocrCanvas(canvas){
  const img = canvas.toDataURL("image/png");
  const ocr = await Tesseract.recognize(img, "por+eng", {
    tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz /-.:,\n"
  });
  return corrigirOCR(ocr.data.text || "");
}

/* ========================================================
   EXTRAÇÃO DE NFs DO TEXTO (nativo ou OCR)
   Busca por âncoras de texto (NFe, Nota Fiscal, etc)
======================================================== */
function extrairNFsDoTexto(texto, cliente){
  const linhas = (texto || "").split(/\r?\n/);
  const notas  = [];
  const vistas = new Set();

  const ancorasNF = /(?:NF|NFE|NOTA\s*FISCAL|Nº\s*NF|NÚMERO\s*NF|NF\s*Nº|NOTA\s*Nº|NOTA\s*N°)/i;

  for(let i = 0; i < linhas.length; i++){
    const linha = linhas[i].trim();
    const l = linha.toUpperCase();
    if(!l) continue;

    if(/CANCEL[AO]/.test(l)) continue;
    if(/CAMSCANNER|DIGITALIZADO/.test(l)) continue;
    if(/CHAVE|CNPJ|EMISS[AÃ]O|PROTOCOLO/.test(l)) continue;
    if(/^\d{10,}$/.test(l)) continue;

    let matches = [];
    let temAncora = ancorasNF.test(l);

    if(temAncora){
      if(cliente === "riachuelo"){
        matches = l.match(/\b\d{8}\b/g) || [];
      } else if(cliente === "3coracoes"){
        matches = l.match(/\b\d{8,9}\b/g) || [];
      } else {
        matches = l.match(/\b\d{7,9}\b/g) || [];
      }

      if(!matches.length && i + 1 < linhas.length){
        const proximaLinha = linhas[i + 1].toUpperCase();
        if(cliente === "riachuelo") matches = proximaLinha.match(/\b\d{8}\b/g) || [];
        else if(cliente === "3coracoes") matches = proximaLinha.match(/\b\d{8,9}\b/g) || [];
        else matches = proximaLinha.match(/\b\d{7,9}\b/g) || [];
      }
    } else {
      if(/\d/.test(l) && !/PEDIDO|VOLUME|PESO|VALOR|QUANTIDADE|QTD/.test(l)){
        if(cliente === "riachuelo") matches = l.match(/\b\d{8}\b/g) || [];
        else if(cliente === "3coracoes") matches = l.match(/\b\d{8,9}\b/g) || [];
        else matches = l.match(/\b\d{7,9}\b/g) || [];
      }
    }

    for(const m of (matches || [])){
      if(vistas.has(m)) continue;
      const nf = normalizarNF(m, cliente);
      if(nf){
        notas.push(nf);
        vistas.add(m);
      }
    }
  }
  return notas;
}

/* ========================================================
   PROCESSAMENTO PRINCIPAL
======================================================== */
async function extrairNotasPDF(file, cliente, indiceArquivo, totalArquivos){
  const buffer = await file.arrayBuffer();
  const pdf    = await pdfjsLib.getDocument({ data: buffer }).promise;
  setStatus(`Analisando ${file.name}...`);

  const textoNativo = await extrairTextoNativo(pdf);
  if(textoNativo !== null){
    debugLog.push(`${file.name}: texto NATIVO extraído`);
    const nfs = extrairNFsDoTexto(textoNativo, cliente);
    return { nfs, metodo: "nativo" };
  }

  debugLog.push(`${file.name}: PDF escaneado → usando OCR`);
  const notas = [];
  for(let i = 1; i <= pdf.numPages; i++){
    const pct = Math.round(((indiceArquivo + (i / pdf.numPages)) / totalArquivos) * 100);
    setProgress(pct, `OCR: ${file.name} — página ${i}/${pdf.numPages}`);
    const page   = await pdf.getPage(i);
    const canvas = await renderizarPagina(page, 2.5);
    const texto  = await ocrCanvas(canvas);
    const nfs    = extrairNFsDoTexto(texto, cliente);
    notas.push(...nfs);
  }
  return { nfs: notas, metodo: "ocr" };
}

function encontrarColuna(obj, candidatos){
  const chaves = Object.keys(obj || {});
  for(const chave of chaves){
    const limpa = chave.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
    for(const candidato of candidatos){
      const cand = candidato.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
      if(limpa === cand || limpa.includes(cand)) return chave;
    }
  }
  return null;
}

function lerExcel(file, cliente){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const data     = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheet    = workbook.Sheets[workbook.SheetNames[0]];
      const json     = XLSX.utils.sheet_to_json(sheet);
      const mapa     = {};
      if(json.length){
        const colNF     = encontrarColuna(json[0], ["Numero","Número","NF","NFe","Nota Fiscal","NOTA","NF_NUM"]);
        const colAWB    = encontrarColuna(json[0], ["Nº AWB","AWB","N AWB","HAWB","AWB_NUM"]);
        json.forEach(linha => {
          let nf = colNF ? String(linha[colNF] ?? "") : "";
          let awb = colAWB ? String(linha[colAWB] ?? "") : "";
          nf = normalizarNF(nf, cliente);
          if(nf) mapa[nf] = { awb: normalizarNumero(awb), emitido: true };
        });
      }
      resolve(mapa);
    };
    reader.readAsArrayBuffer(file);
  });
}

async function lerFisico(file){
  if(!file) return 0;
  const buffer = await file.arrayBuffer();
  const pdf    = await pdfjsLib.getDocument({ data: buffer }).promise;
  let textoOCR = "";
  for(let i = 1; i <= pdf.numPages; i++){
    const page   = await pdf.getPage(i);
    const canvas = await renderizarPagina(page, 2);
    textoOCR    += "\n" + await ocrCanvas(canvas);
  }
  const match = textoOCR.toUpperCase().match(/TOTAL\s*(?:DE\s*)?(?:VOLUMES?|CAIXAS?)\s*[:\-]?\s*(\d{1,5})/);
  return match ? parseInt(match[1], 10) : 0;
}

async function processar(){
  try{
    debugLog = [];
    setStatus("Iniciando...");
    clienteAtual = document.getElementById("cliente").value;
    const pdfs     = document.getElementById("manifesto").files;
    const ediFile  = document.getElementById("edi").files[0];
    const capaFile = document.getElementById("capa").files[0];

    if(!pdfs.length){ setStatus("Selecione ao menos um PDF de manifesto."); return; }

    let notasManifestoBrutas = [];
    const metodos = [];
    for(let idx = 0; idx < pdfs.length; idx++){
      const { nfs, metodo } = await extrairNotasPDF(pdfs[idx], clienteAtual, idx, pdfs.length);
      notasManifestoBrutas.push(...nfs);
      metodos.push({ arquivo: pdfs[idx].name, metodo });
    }
    hideProgress();

    manifestNFs = notasManifestoBrutas;
    const duplicadosMapa = {};
    for(const n of manifestNFs) duplicadosMapa[n] = (duplicadosMapa[n] || 0) + 1;

    let mapaEDI = ediFile ? await lerExcel(ediFile, clienteAtual) : {};
    let emitidos = 0;
    resultado = manifestNFs.map((nf, index) => {
      const reg = mapaEDI[nf];
      if(reg) emitidos++;
      return {
        ordem: index + 1,
        nf,
        emitido: reg ? "SIM" : "NÃO",
        awb: reg ? reg.awb : "",
        status: duplicadosMapa[nf] > 1 ? "DUPLICADO" : (reg ? "OK" : "NÃO EMITIDO")
      };
    });

    fisicoTotal = capaFile ? await lerFisico(capaFile) : 0;
    
    document.getElementById("manifestoCount").innerText = manifestNFs.length;
    document.getElementById("emitidoCount").innerText = emitidos;
    document.getElementById("fisicoCount").innerText = fisicoTotal || "—";
    
    atualizarInterface(metodos, duplicadosMapa, emitidos);
    setStatus(`Conferência concluída. ${manifestNFs.length} NF(s) processadas.`);
    document.getElementById("debugInfo").innerText = debugLog.join("\n");
  } catch(err){
    console.error(err);
    setStatus("Erro: " + err.message);
    hideProgress();
  }
}

function atualizarInterface(metodos, duplicadosMapa, emitidos){
  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";
  resultado.forEach(r => {
    const tr = document.createElement("tr");
    const cls = r.status === "OK" ? "st-ok" : (r.status === "DUPLICADO" ? "st-dup" : "st-nao");
    tr.innerHTML = `<td>${r.ordem}</td><td>${r.nf}</td><td>${r.emitido}</td><td>${r.awb || "—"}</td><td class="${cls}">${r.status}</td>`;
    tbody.appendChild(tr);
  });

  const naoEmitidas = resultado.filter(r => r.status === "NÃO EMITIDO").map(r => r.nf);
  const duplicadas  = Object.keys(duplicadosMapa).filter(nf => duplicadosMapa[nf] > 1);
  document.getElementById("divCount").innerText = naoEmitidas.length + duplicadas.length;

  document.getElementById("resumoGeral").innerHTML = `<b>Cliente:</b> ${clienteAtual}<br><b>Total Manifesto:</b> ${manifestNFs.length}<br><b>Total Emitido:</b> ${emitidos}<br><b>Método:</b> ${metodos.map(m=>m.metodo).join(", ")}`;
  
  let html = naoEmitidas.length ? `<div class="status-warn">⚠️ ${naoEmitidas.length} NF(s) não encontradas:</div><div>${naoEmitidas.join(", ")}</div>` : `<div class="status-ok">✅ Tudo emitido!</div>`;
  document.getElementById("analise").innerHTML = html;
}

function filtrar(){
  const v = document.getElementById("busca").value.toLowerCase();
  document.querySelectorAll("#tabela tbody tr").forEach(l => l.style.display = l.innerText.toLowerCase().includes(v) ? "" : "none");
}

function baixarExcel(){
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resultado), "Conferencia");
  XLSX.writeFile(wb, "conferencia.xlsx");
}
</script>
</body>
</html>

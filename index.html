<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conferência de Manifestos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#eef1f5;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

.logo{
height:40px;
}

h1{
color:#1e4f91;
margin:0;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.uploads{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
background:#f3f4f7;
padding:15px;
border-radius:8px;
flex:1;
}

button{
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.process{
background:#1e73be;
color:white;
}

.excel{
background:#2e9f4b;
color:white;
}

.clear{
background:#7a8798;
color:white;
}

.counts{
display:flex;
gap:20px;
margin:15px 0;
}

.count{
background:#f3f4f7;
padding:10px;
border-radius:6px;
text-align:center;
width:80px;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#1e4f91;
color:white;
}

td,th{
padding:8px;
text-align:center;
}

.summary-box{
background:#f3f4f7;
padding:12px;
border-radius:8px;
margin:12px 0;
line-height:1.5;
}

.section-title{
font-weight:bold;
margin:10px 0 6px 0;
color:#1e4f91;
}

.status-ok{
color:#2e7d32;
font-weight:bold;
}

.status-warn{
color:#c62828;
font-weight:bold;
}

.search{
margin:10px 0;
}

select, input[type="text"]{
padding:8px;
border:1px solid #bfc7d1;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo-azulcargo.png" class="logo">

<h1>Conferência de Manifestos</h1>

<div class="subtitle">
Manifesto PDF escaneado + EDI Excel + Capa / conferência física
</div>

<div class="uploads">

<div class="box">
<b>Cliente</b><br>
<select id="cliente">
<option value="riachuelo">Riachuelo</option>
<option value="3coracoes">3 Corações</option>
</select>
</div>

<div class="box">
<b>Upload Manifestos (PDF)</b><br>
<input type="file" id="manifesto" multiple accept=".pdf">
</div>

<div class="box">
<b>Upload Planilha EDI (Excel)</b><br>
<input type="file" id="edi" accept=".xls,.xlsx,.csv">
</div>

<div class="box">
<b>Upload Capa / Conferência Física</b><br>
<input type="file" id="capa" accept=".pdf,image/*">
</div>

</div>

<button class="process" onclick="processar()">PROCESSAR CONFERÊNCIA</button>
<button class="excel" onclick="baixarExcel()">Baixar Excel</button>
<button class="clear" onclick="location.reload()">Limpar</button>

<div id="status"></div>

<div class="counts">
<div class="count">
Manifesto<br>
<b id="manifestoCount">0</b>
</div>

<div class="count">
Emitido<br>
<b id="emitidoCount">0</b>
</div>

<div class="count">
Físico<br>
<b id="fisicoCount">0</b>
</div>
</div>

<div class="section-title">Resumo Geral</div>
<div id="resumoGeral" class="summary-box"></div>

<div class="section-title">Análise</div>
<div id="analise" class="summary-box"></div>

<div class="search">
<input type="text" id="busca" placeholder="Buscar NF ou AWB..." onkeyup="filtrar()">
</div>

<table id="tabela">
<thead>
<tr>
<th>NF</th>
<th>Emitido</th>
<th>AWB</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

let resultado = [];
let manifestNFs = [];
let fisicoTotal = 0;
let clienteAtual = "riachuelo";

function normalizarNumero(valor){
  if(valor === null || valor === undefined) return "";
  return String(valor).replace(/\D/g, "").trim();
}

function deduplicarPreservando(lista){
  const vistos = new Set();
  const saida = [];
  for(const item of lista){
    if(!vistos.has(item)){
      vistos.add(item);
      saida.push(item);
    }
  }
  return saida;
}

function contarDuplicados(lista){
  const mapa = {};
  for(const item of lista){
    mapa[item] = (mapa[item] || 0) + 1;
  }
  return mapa;
}

function getCropForClient(cliente, canvas){
  const w = canvas.width;
  const h = canvas.height;

  if(cliente === "riachuelo"){
    return {
      x: Math.floor(w * 0.56),
      y: Math.floor(h * 0.12),
      width: Math.floor(w * 0.18),
      height: Math.floor(h * 0.76)
    };
  }

  if(cliente === "3coracoes"){
    return {
      x: Math.floor(w * 0.50),
      y: Math.floor(h * 0.16),
      width: Math.floor(w * 0.20),
      height: Math.floor(h * 0.68)
    };
  }

  return {
    x: Math.floor(w * 0.50),
    y: Math.floor(h * 0.15),
    width: Math.floor(w * 0.22),
    height: Math.floor(h * 0.75)
  };
}

function limparTextoOCR(texto){
  return (texto || "")
    .replace(/[|]/g, " ")
    .replace(/[Oo](?=\d)/g, "0")
    .replace(/(?<=\d)[Oo]/g, "0")
    .replace(/[Ss](?=\d)/g, "5")
    .replace(/(?<=\d)[Ss]/g, "5");
}

function extrairNFsDoTexto(texto, cliente){
  const linhas = limparTextoOCR(texto).split(/\r?\n/);
  const notas = [];

  for(let i = 0; i < linhas.length; i++){
    let linha = (linhas[i] || "").trim().toUpperCase();

    if(!linha) continue;
    if(linha.includes("CANCELADO") || linha.includes("CANCELADA") || linha.includes("CANCEL")) continue;
    if(linha.includes("DIGITALIZADO COM CAMSCANNER")) continue;

    const encontrados = linha.match(/\b\d{8,9}\b/g) || [];

    encontrados.forEach(nf => {
      if(cliente === "3coracoes"){
        if(/^0\d{7,8}$/.test(nf)){
          notas.push(nf);
        }
      } else {
        const limpa = nf.replace(/^0+/, "");
        if(/^\d{8,9}$/.test(limpa)){
          notas.push(limpa);
        }
      }
    });
  }

  return notas;
}

async function reconhecerCanvas(canvas, lang="eng"){
  const img = canvas.toDataURL("image/png");
  const ocr = await Tesseract.recognize(img, lang);
  return ocr.data.text || "";
}

async function extrairNotasPDF(file, cliente){
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  const notas = [];

  for(let i = 1; i <= pdf.numPages; i++){
    document.getElementById("status").innerText =
      `Lendo manifesto ${file.name} - página ${i}/${pdf.numPages}...`;

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 2 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;

    const crop = getCropForClient(cliente, canvas);

    const cropCanvas = document.createElement("canvas");
    cropCanvas.width = crop.width;
    cropCanvas.height = crop.height;
    const cropCtx = cropCanvas.getContext("2d");

    cropCtx.drawImage(
      canvas,
      crop.x, crop.y, crop.width, crop.height,
      0, 0, crop.width, crop.height
    );

    const textoColuna = await reconhecerCanvas(cropCanvas, "eng");
    const nfs = extrairNFsDoTexto(textoColuna, cliente);

    notas.push(...nfs);
  }

  return notas;
}

function encontrarColuna(obj, candidatos){
  const chaves = Object.keys(obj || {});
  for(const chave of chaves){
    const limpa = chave
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toUpperCase()
      .trim();

    for(const candidato of candidatos){
      const cand = candidato
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase();
      if(limpa === cand || limpa.includes(cand)){
        return chave;
      }
    }
  }
  return null;
}

function lerExcel(file, cliente){
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);

      const mapa = {};

      if(json.length){
        const colNF = encontrarColuna(json[0], ["Numero", "Número", "NF", "NFe", "Nota Fiscal"]);
        const colAWB = encontrarColuna(json[0], ["Nº AWB", "AWB", "N AWB"]);
        const colPedido = encontrarColuna(json[0], ["Pedido", "PedidoVol"]);

        json.forEach(linha => {
          let nf = colNF ? String(linha[colNF] ?? "") : "";
          let awb = colAWB ? String(linha[colAWB] ?? "") : "";
          let pedido = colPedido ? String(linha[colPedido] ?? "") : "";

          nf = nf.trim().replace(/\D/g, "");
          awb = normalizarNumero(awb);
          pedido = normalizarNumero(pedido);

          if(cliente !== "3coracoes"){
            nf = nf.replace(/^0+/, "");
          }

          if(nf){
            mapa[nf] = {
              awb,
              pedido,
              emitido: true
            };
          }
        });
      }

      resolve(mapa);
    };

    reader.readAsArrayBuffer(file);
  });
}

async function lerFisico(file){
  if(!file) return 0;

  const nome = (file.name || "").toLowerCase();

  if(nome.endsWith(".pdf")){
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let texto = "";

    for(let i = 1; i <= pdf.numPages; i++){
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: ctx, viewport }).promise;
      texto += "\n" + await reconhecerCanvas(canvas, "eng");
    }

    return extrairFisicoDoTexto(texto);
  }

  const texto = await reconhecerCanvas(await fileParaCanvas(file), "eng");
  return extrairFisicoDoTexto(texto);
}

async function fileParaCanvas(file){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      resolve(canvas);
    };
    img.src = URL.createObjectURL(file);
  });
}

function extrairFisicoDoTexto(texto){
  const normalizado = (texto || "").toUpperCase();

  let match = normalizado.match(/ROMANEIO\s*[:\-]?\s*(\d{1,4})/);
  if(match) return parseInt(match[1], 10);

  match = normalizado.match(/QTD\.?\s*VOLUMES.*?CONTAGEM.*?(\d{1,4})/);
  if(match) return parseInt(match[1], 10);

  match = normalizado.match(/CONTAGEM.*?(\d{1,4})/);
  if(match) return parseInt(match[1], 10);

  return 0;
}

function mostrarTabela(){
  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  resultado.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.nf}</td>
      <td>${r.emitido}</td>
      <td>${r.awb}</td>
      <td>${r.status}</td>
    `;
    tbody.appendChild(tr);
  });
}

function filtrar(){
  const valor = document.getElementById("busca").value.toLowerCase();
  const linhas = document.querySelectorAll("#tabela tbody tr");

  linhas.forEach(l => {
    const texto = l.innerText.toLowerCase();
    l.style.display = texto.includes(valor) ? "" : "none";
  });
}

function atualizarResumoGeral(totalManifesto, totalEmitido, totalFisico){
  document.getElementById("resumoGeral").innerHTML = `
    Cliente: <b>${clienteAtual === "riachuelo" ? "Riachuelo" : "3 Corações"}</b><br>
    Total do Manifesto: <b>${totalManifesto}</b><br>
    Total Emitido (somente NF do manifesto): <b>${totalEmitido}</b><br>
    Total Físico (capa): <b>${totalFisico}</b>
  `;
}

function atualizarAnalise(totalManifesto, totalEmitido, totalFisico, duplicadosMapa){
  const naoEmitidas = resultado.filter(r => r.status === "NÃO EMITIDO").map(r => r.nf);
  const duplicadas = Object.keys(duplicadosMapa).filter(nf => duplicadosMapa[nf] > 1);

  const percentErro = totalManifesto > 0
    ? ((naoEmitidas.length / totalManifesto) * 100).toFixed(2)
    : "0.00";

  let html = "";

  if(naoEmitidas.length){
    html += `<div class="status-warn">NF(s) do manifesto não emitidas: ${naoEmitidas.length} (${percentErro}%)</div>`;
    html += `<div>${naoEmitidas.join("<br>")}</div><br>`;
  }else{
    html += `<div class="status-ok">Todas as NF(s) do manifesto foram emitidas.</div><br>`;
  }

  if(totalFisico > 0){
    if(totalFisico === totalManifesto){
      html += `<div class="status-ok">Quantidade física bate com o manifesto.</div><br>`;
    }else{
      html += `<div class="status-warn">Divergência física: Manifesto ${totalManifesto} x Físico ${totalFisico}</div><br>`;
    }
  }else{
    html += `<div class="status-warn">Não foi possível identificar a quantidade física da capa.</div><br>`;
  }

  if(duplicadas.length){
    html += `<div class="status-warn">NF(s) duplicadas no manifesto:</div>`;
    html += `<div>${duplicadas.join("<br>")}</div>`;
  }

  document.getElementById("analise").innerHTML = html;
}

async function processar(){
  try{
    document.getElementById("status").innerText = "Processando...";

    clienteAtual = document.getElementById("cliente").value;

    const pdfs = document.getElementById("manifesto").files;
    const ediFile = document.getElementById("edi").files[0];
    const capaFile = document.getElementById("capa").files[0];

    let notasManifestoBrutas = [];

    for(const file of pdfs){
      const notas = await extrairNotasPDF(file, clienteAtual);
      notasManifestoBrutas.push(...notas);
    }

    manifestNFs = notasManifestoBrutas.slice();
    const duplicadosMapa = contarDuplicados(manifestNFs);

    document.getElementById("manifestoCount").innerText = manifestNFs.length;

    let mapaEDI = {};
    if(ediFile){
      document.getElementById("status").innerText = "Lendo planilha EDI...";
      mapaEDI = await lerExcel(ediFile, clienteAtual);
    }

    let emitidos = 0;
    resultado = [];

    manifestNFs.forEach((nf, index) => {
      const registroEDI = mapaEDI[nf];
      const emitido = registroEDI ? "SIM" : "NÃO";
      const awb = registroEDI ? registroEDI.awb : "";
      let status = registroEDI ? "OK" : "NÃO EMITIDO";

      if(duplicadosMapa[nf] > 1){
        status = "DUPLICADO NO MANIFESTO";
      }

      if(registroEDI){
        emitidos++;
      }

      resultado.push({
        ordem: index + 1,
        nf,
        emitido,
        awb,
        status
      });
    });

    document.getElementById("emitidoCount").innerText = emitidos;

    fisicoTotal = await lerFisico(capaFile);
    document.getElementById("fisicoCount").innerText = fisicoTotal;

    atualizarResumoGeral(manifestNFs.length, emitidos, fisicoTotal);
    atualizarAnalise(manifestNFs.length, emitidos, fisicoTotal, duplicadosMapa);
    mostrarTabela();

    document.getElementById("status").innerText = "Conferência concluída";
  }catch(err){
    console.error(err);
    document.getElementById("status").innerText = "Erro no processamento";
  }
}

function baixarExcel(){
  const wb = XLSX.utils.book_new();

  const resumo = [
    { Indicador: "Cliente", Valor: clienteAtual === "riachuelo" ? "Riachuelo" : "3 Corações" },
    { Indicador: "Manifesto", Valor: manifestNFs.length },
    { Indicador: "Emitido", Valor: resultado.filter(r => r.emitido === "SIM").length },
    { Indicador: "Físico", Valor: fisicoTotal }
  ];
  const wsResumo = XLSX.utils.json_to_sheet(resumo);
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");

  const analise = resultado.map(r => ({
    Ordem_Manifesto: r.ordem,
    NF: r.nf,
    Emitido: r.emitido,
    AWB: r.awb,
    Status: r.status
  }));
  const wsAnalise = XLSX.utils.json_to_sheet(analise);
  XLSX.utils.book_append_sheet(wb, wsAnalise, "Analise");

  const naoEmitidas = resultado
    .filter(r => r.status === "NÃO EMITIDO")
    .map(r => ({
      Ordem_Manifesto: r.ordem,
      NF: r.nf,
      Emitido: r.emitido,
      AWB: r.awb,
      Status: r.status
    }));
  const wsNaoEmitidas = XLSX.utils.json_to_sheet(
    naoEmitidas.length ? naoEmitidas : [{ Ordem_Manifesto: "", NF: "", Emitido: "", AWB: "", Status: "Sem divergências" }]
  );
  XLSX.utils.book_append_sheet(wb, wsNaoEmitidas, "NaoEmitidas");

  XLSX.writeFile(wb, "conferencia.xlsx");
}
</script>

</body>
</html>

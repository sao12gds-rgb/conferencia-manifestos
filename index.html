<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conferência de Manifestos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1)
}

h1{
text-align:center;
color:#003a8f
}

input[type=file]{
margin:10px 0
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold
}

.processar{background:#0074d9;color:white}
.baixar{background:#16a34a;color:white}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th{
background:#003a8f;
color:white;
padding:10px
}

td{
padding:8px;
border:1px solid #ddd;
text-align:center
}

#buscar{
padding:10px;
width:250px;
border-radius:6px;
border:1px solid #ccc;
margin-right:10px
}

.dashboard{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
background:#f3f4f6;
padding:15px;
border-radius:10px;
text-align:center;
flex:1
}

.card h3{
margin:0;
font-size:14px
}

.card span{
font-size:24px;
font-weight:bold
}

</style>
</head>

<body>

<div class="container">

<h1>Conferência de Manifestos</h1>

<h3>Upload Manifestos</h3>
<input type="file" id="manifestos" multiple>

<h3>Upload Planilha EDI</h3>
<input type="file" id="edi">

<h3>Upload Capa Conferência</h3>
<input type="file" id="capa">

<br>

<button class="processar" onclick="processar()">PROCESSAR</button>
<button class="baixar" onclick="baixarExcel()">BAIXAR EXCEL</button>

<div class="dashboard">

<div class="card">
<h3>Manifesto</h3>
<span id="totalManifesto">0</span>
</div>

<div class="card">
<h3>Emitido</h3>
<span id="totalEmitido">0</span>
</div>

<div class="card">
<h3>Físico</h3>
<span id="totalFisico">0</span>
</div>

</div>

<br>

<input id="buscar" placeholder="Buscar NF ou AWB" onkeyup="filtrar()">

<button onclick="mostrarDivergencias()">Mostrar Divergências</button>
<button onclick="mostrarTodos()">Mostrar Todos</button>

<table id="tabela">

<thead>
<tr>
<th>NF</th>
<th>Manifesto</th>
<th>Emitido</th>
<th>AWB</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let manifesto=[]
let emitido=[]
let resultado=[]

async function processar(){

manifesto=[]
emitido=[]
resultado=[]

let files=document.getElementById("manifestos").files

for(let file of files){

const texto=await lerPDF(file)

const nfs=texto.match(/\d{7,9}/g)

if(nfs)manifesto.push(...nfs)

}

manifesto=[...new Set(manifesto)]

document.getElementById("totalManifesto").innerText=manifesto.length

let ediFile=document.getElementById("edi").files[0]

const data=await ediFile.arrayBuffer()

const workbook=XLSX.read(data)

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet)

json.forEach(r=>{

emitido.push({

nf:String(r.Numero),

awb:r["Nº AWB"]||""

})

})

document.getElementById("totalEmitido").innerText=emitido.length

cruzar()

}

function cruzar(){

let todas=[

...manifesto,
...emitido.map(e=>e.nf)

]

todas=[...new Set(todas)]

const tbody=document.querySelector("#tabela tbody")

tbody.innerHTML=""

todas.forEach(nf=>{

let man=manifesto.includes(nf)

let emi=emitido.find(e=>e.nf==nf)

let awb=emi?emi.awb:""

let status="OK"

if(!man&&emi)status="FALTA NO MANIFESTO"

if(man&&!emi)status="NAO EMITIDA"

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${nf}</td>
<td>${man?"SIM":"NAO"}</td>
<td>${emi?"SIM":"NAO"}</td>
<td>${awb}</td>
<td>${status}</td>

`

tbody.appendChild(tr)

resultado.push({

NF:nf,
Manifesto:man,
Emitido:emi?"SIM":"NAO",
AWB:awb,
Status:status

})

})

}

async function lerPDF(file){

const reader=new FileReader()

return new Promise(resolve=>{

reader.onload=async function(){

const typedarray=new Uint8Array(this.result)

const pdf=await pdfjsLib.getDocument(typedarray).promise

let texto=""

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const viewport=page.getViewport({scale:2})

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.height=viewport.height
canvas.width=viewport.width

await page.render({canvasContext:ctx,viewport:viewport}).promise

const ocr=await Tesseract.recognize(canvas)

texto+=ocr.data.text

}

resolve(texto)

}

reader.readAsArrayBuffer(file)

})

}

function filtrar(){

const filtro=document.getElementById("buscar").value.toUpperCase()

const linhas=document.querySelectorAll("#tabela tbody tr")

linhas.forEach(l=>{

const texto=l.innerText.toUpperCase()

l.style.display=texto.includes(filtro)?"":"none"

})

}

function mostrarDivergencias(){

const linhas=document.querySelectorAll("#tabela tbody tr")

linhas.forEach(l=>{

const status=l.children[4].innerText

l.style.display=status=="OK"?"none":""

})

}

function mostrarTodos(){

const linhas=document.querySelectorAll("#tabela tbody tr")

linhas.forEach(l=>l.style.display="")

}

function baixarExcel(){

const ws=XLSX.utils.json_to_sheet(resultado)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Conferencia")

XLSX.writeFile(wb,"resultado.xlsx")

}

</script>

</body>
</html>

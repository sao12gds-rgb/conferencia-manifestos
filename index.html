<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conferência de Manifestos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef1f5;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

.logo{
height:40px;
}

h1{
color:#1e4f91;
margin:0;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.uploads{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
background:#f3f4f7;
padding:15px;
border-radius:8px;
flex:1;
}

button{
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.process{
background:#1e73be;
color:white;
}

.excel{
background:#2e9f4b;
color:white;
}

.clear{
background:#7a8798;
color:white;
}

.counts{
display:flex;
gap:20px;
margin:15px 0;
}

.count{
background:#f3f4f7;
padding:10px;
border-radius:6px;
text-align:center;
width:80px;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#1e4f91;
color:white;
}

td,th{
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<img src="logo-azulcargo.png" class="logo">

<h1>Conferência de Manifestos</h1>

<div class="subtitle">
Manifesto PDF escaneado + EDI Excel + Capa / conferência física
</div>

<div class="uploads">

<div class="box">
<b>Upload Manifestos (PDF)</b><br>
<input type="file" id="manifesto" multiple>
</div>

<div class="box">
<b>Upload Planilha EDI (Excel)</b><br>
<input type="file" id="edi">
</div>

<div class="box">
<b>Upload Capa / Conferência Física</b><br>
<input type="file" id="capa">
</div>

</div>

<button class="process" onclick="processar()">PROCESSAR CONFERÊNCIA</button>
<button class="excel" onclick="baixarExcel()">Baixar Excel</button>
<button class="clear" onclick="location.reload()">Limpar</button>

<div id="status"></div>

<div class="counts">

<div class="count">
Manifesto<br>
<b id="manifestoCount">0</b>
</div>

<div class="count">
Emitido<br>
<b id="emitidoCount">0</b>
</div>

<div class="count">
Físico<br>
<b id="fisicoCount">0</b>
</div>

</div>

<input type="text" id="busca" placeholder="Buscar NF ou AWB..." onkeyup="filtrar()">

<table id="tabela">

<thead>
<tr>
<th>NF</th>
<th>Emitido</th>
<th>AWB</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let resultado=[]

function limparNumero(n){

if(!n) return ""

n=String(n).replace(/\D/g,'')

n=n.replace(/^0+/,'')

return n

}

async function extrairNotasPDF(file){

const buffer=await file.arrayBuffer()

const pdf=await pdfjsLib.getDocument({data:buffer}).promise

let notas=[]

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const viewport=page.getViewport({scale:2})

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:ctx,viewport:viewport}).promise

const img=canvas.toDataURL()

const ocr=await Tesseract.recognize(img,"eng")

const texto=ocr.data.text

const match=texto.match(/\b\d{8,9}\b/g)

if(match){

match.forEach(n=>{

n=limparNumero(n)

if(n.length>=8 && n.length<=9){

notas.push(n)

}

})

}

}

return notas

}

function lerExcel(file){

return new Promise(resolve=>{

const reader=new FileReader()

reader.onload=e=>{

const data=new Uint8Array(e.target.result)

const workbook=XLSX.read(data,{type:"array"})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet)

let mapa={}

json.forEach(l=>{

let nf=limparNumero(l["Numero"]||l["Número"]||l["NF"]||l["NFe"])

let awb=limparNumero(l["Nº AWB"]||l["AWB"])

if(nf){

mapa[nf]=awb

}

})

resolve(mapa)

}

reader.readAsArrayBuffer(file)

})

}

async function processar(){

document.getElementById("status").innerText="Processando..."

const pdfs=document.getElementById("manifesto").files

const ediFile=document.getElementById("edi").files[0]

let notasManifesto=[]

for(const file of pdfs){

const notas=await extrairNotasPDF(file)

notasManifesto.push(...notas)

}

document.getElementById("manifestoCount").innerText=notasManifesto.length

let mapaEDI={}

if(ediFile){

mapaEDI=await lerExcel(ediFile)

}

let emitidos=0

resultado=[]

notasManifesto.forEach(nf=>{

let emitido=false

let awb=""

if(mapaEDI[nf]){

emitido=true
awb=mapaEDI[nf]
emitidos++

}

resultado.push({

nf:nf,
emitido:emitido?"SIM":"NÃO",
awb:awb,
status:emitido?"OK":"NÃO EMITIDO"

})

})

document.getElementById("emitidoCount").innerText=emitidos

mostrarTabela()

document.getElementById("status").innerText="Conferência concluída"

}

function mostrarTabela(){

const tbody=document.querySelector("#tabela tbody")

tbody.innerHTML=""

resultado.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.nf}</td>
<td>${r.emitido}</td>
<td>${r.awb}</td>
<td>${r.status}</td>

`

tbody.appendChild(tr)

})

}

function filtrar(){

const valor=document.getElementById("busca").value.toLowerCase()

const linhas=document.querySelectorAll("#tabela tbody tr")

linhas.forEach(l=>{

const texto=l.innerText.toLowerCase()

l.style.display=texto.includes(valor)?"":"none"

})

}

function baixarExcel(){

const ws=XLSX.utils.json_to_sheet(resultado)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Relatorio")

XLSX.writeFile(wb,"conferencia.xlsx")

}

</script>

</body>
</html>

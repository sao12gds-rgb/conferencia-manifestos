<!DOCTYPE html>
<html lang="pt-BR">

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#eef1f5;
}

width:900px;
margin:auto;
background:white;
padding:30px;

align-items:center;
gap:20px;
}

.logo{
height:45px;
}

h1{
color:#1e4f91;
margin:0;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.uploads{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
background:#f3f4f7;
padding:15px;
border-radius:8px;
flex:1;
}

button{
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.process{
background:#1e73be;
color:white;
}

.excel{
background:#2e9f4b;
color:white;
}

.clear{
background:#7a8798;
color:white;
}

.status{
margin-top:10px;
color:#1e73be;
}

.counts{
display:flex;
gap:20px;
margin:15px 0;
}

padding:10px;

}

.search{
margin-top:15px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#1e4f91;
color:white;
}

td,th{
padding:8px;
text-align:center;
}

}

}

font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<img src="logo-azulcargo.png" class="logo">
<h1>Conferência de Manifestos</h1>
</div>

<div class="subtitle">
Manifesto PDF escaneado + EDI Excel + Capa / conferência física
</div>

<div class="uploads">

<div class="box">
<b>Upload Manifestos (PDF)</b><br>
<input type="file" id="manifesto" multiple>
</div>

<div class="box">
<b>Upload Planilha EDI (Excel)</b><br>
<input type="file" id="edi">
</div>

<div class="box">
<b>Upload Capa / Conferência Física</b><br>
<input type="file" id="capa">
</div>

</div>

<button class="process" onclick="processar()">PROCESSAR CONFERÊNCIA</button>
<button class="excel" onclick="baixarExcel()">Baixar Excel</button>
<button class="clear" onclick="location.reload()">Limpar</button>

<div class="status" id="status"></div>

<div class="counts">

<div class="count">
Manifesto<br>
<b id="manifestoCount">0</b>
</div>

<div class="count">
Emitido<br>
<b id="emitidoCount">0</b>
</div>

<div class="count">
Físico<br>
<b id="fisicoCount">0</b>
</div>

</div>

<div id="resumoErros"></div>

<div class="search">
<input type="text" id="busca" placeholder="Buscar NF ou AWB..." onkeyup="filtrar()">
</div>

<table id="tabela">

<thead>
<tr>
<th>NF</th>
<th>Emitido</th>
<th>AWB</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>
let resultado = [];

function normalizarNumero(valor){
  if(valor === null || valor === undefined) return "";
  return String(valor).replace(/\D/g,"").trim();
}

function textoContemCabecalhoNF(linha){
  return /NFE|NOTAS FISCAIS|NOTA FISCAL/i.test(linha);
}

function extrairNFColuna(texto){
  const linhas = texto.split(/\r?\n/);
  const notas = [];
  let modoColeta = false;
  let linhasSemNumero = 0;

  for(let i = 0; i < linhas.length; i++){
    const linhaOriginal = linhas[i] || "";
    const linha = linhaOriginal.trim();

    if(textoContemCabecalhoNF(linha)){
      modoColeta = true;
      linhasSemNumero = 0;
      continue;
    }

    if(modoColeta){
      const encontrados = linha.match(/\b\d{8,9}\b/g);

      if(encontrados && encontrados.length){
        encontrados.forEach(nf => notas.push(nf));
        linhasSemNumero = 0;
      }else{
        linhasSemNumero++;
        if(linhasSemNumero > 8){
          modoColeta = false;
        }
      }
    }
  }

  if(notas.length){
    return notas;
  }

  // fallback para OCR ruim: pega só números de 8/9 dígitos da página
  const fallback = texto.match(/\b\d{8,9}\b/g) || [];
  return fallback;
}

async function extrairNotasPDF(file){
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buffer}).promise;

  let notas = [];

  for(let i = 1; i <= pdf.numPages; i++){
    document.getElementById("status").innerText = `Lendo manifesto ${file.name} - página ${i}/${pdf.numPages}...`;

    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale:2});

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext:ctx,
      viewport:viewport
    }).promise;

    const img = canvas.toDataURL();

    const ocr = await Tesseract.recognize(img, "eng");
    const texto = ocr.data.text || "";

    const encontradas = extrairNFColuna(texto);
    notas.push(...encontradas);
  }

  return notas;
}

function encontrarColuna(obj, candidatos){
  const chaves = Object.keys(obj || {});
  for(const chave of chaves){
    const chaveLimpa = chave
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toUpperCase()
      .trim();

    for(const candidato of candidatos){
      if(chaveLimpa === candidato || chaveLimpa.includes(candidato)){
        return chave;
      }
    }
  }
  return null;
}

function lerExcel(file){
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data,{type:"array"});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);

      let mapa = {};

      if(json.length){
        const colunaNF = encontrarColuna(json[0], ["NUMERO","NF","NOTA FISCAL","NFE"]);
        const colunaAWB = encontrarColuna(json[0], ["N AWB","NO AWB","Nº AWB","AWB"]);

        json.forEach(l => {
          const nf = normalizarNumero(colunaNF ? l[colunaNF] : "");
          const awb = normalizarNumero(colunaAWB ? l[colunaAWB] : "");

          if(nf){
            mapa[nf] = awb;
          }
        });
      }

      resolve(mapa);
    };

    reader.readAsArrayBuffer(file);
  });
}

async function lerFisico(file){
  if(!file) return 0;

  const url = URL.createObjectURL(file);
  const ocr = await Tesseract.recognize(url,"eng");
  const texto = ocr.data.text || "";

  let match = texto.match(/ROMANEIO\s*(\d{1,4})/i);
  if(match) return parseInt(match[1],10);

  match = texto.match(/QTD\.?\s*VOLUMES.*?(\d{1,4})/i);
  if(match) return parseInt(match[1],10);

  match = texto.match(/CONTAGEM.*?(\d{1,4})/i);
  if(match) return parseInt(match[1],10);

  return 0;
}

async function processar(){
  document.getElementById("status").innerText = "Processando...";

  const pdfs = document.getElementById("manifesto").files;
  const ediFile = document.getElementById("edi").files[0];
  const capaFile = document.getElementById("capa").files[0];

  let notasManifesto = [];

  for(const file of pdfs){
    const notas = await extrairNotasPDF(file);
    notasManifesto.push(...notas);
  }

  document.getElementById("manifestoCount").innerText = notasManifesto.length;

  let mapaEDI = {};
  if(ediFile){
    document.getElementById("status").innerText = "Lendo planilha EDI...";
    mapaEDI = await lerExcel(ediFile);
  }

  let emitidos = 0;
  let duplicados = {};
  resultado = [];

  notasManifesto.forEach(nf => {
    let emitido = false;
    let awb = "";
    let status = "";

    if(mapaEDI[nf] !== undefined){
      emitido = true;
      awb = mapaEDI[nf];
    }

    if(duplicados[nf]){
      status = "DUPLICADO NO MANIFESTO";
    }else{
      duplicados[nf] = true;
      status = emitido ? "OK" : "NÃO EMITIDO";
    }

    if(emitido && status !== "DUPLICADO NO MANIFESTO"){
      emitidos++;
    }

    resultado.push({
      nf,
      emitido,
      awb,
      status
    });
  });

  document.getElementById("emitidoCount").innerText = emitidos;

  const fisico = await lerFisico(capaFile);
  document.getElementById("fisicoCount").innerText = fisico;

  mostrarTabela();
  montarResumo(notasManifesto.length, emitidos, fisico);

  document.getElementById("status").innerText = "Conferência concluída";
}

function montarResumo(totalManifesto, totalEmitido, totalFisico){
  const naoEmitidas = resultado
    .filter(r => r.status === "NÃO EMITIDO")
    .map(r => r.nf);

  let html = "";

  if(naoEmitidas.length){
    html += `<p class="erro">⚠ ${naoEmitidas.length} NF(s) do manifesto não foram emitidas</p>`;
    html += `<p><b>NFs não emitidas:</b><br>${naoEmitidas.join("<br>")}</p>`;
  }

  if(totalFisico && totalFisico !== totalManifesto){
    html += `<p class="erro">⚠ Divergência física: Manifesto ${totalManifesto} x Físico ${totalFisico}</p>`;
  }

  if(!html){
    html = `<p class="ok">✔ Conferência sem divergências</p>`;
  }

  document.getElementById("resumoErros").innerHTML = html;
}

function mostrarTabela(){
  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  resultado.forEach(r => {
    const tr = document.createElement("tr");

    if(r.status === "DUPLICADO NO MANIFESTO"){
      tr.classList.add("duplicado");
    }

    tr.innerHTML = `
      <td>${r.nf}</td>
      <td>${r.emitido ? "SIM" : "NÃO"}</td>
      <td>${r.awb}</td>
      <td>${r.status}</td>
    `;

    tbody.appendChild(tr);
  });
}

function filtrar(){
  const valor = document.getElementById("busca").value.toLowerCase();
  const linhas = document.querySelectorAll("#tabela tbody tr");

  linhas.forEach(l => {
    const texto = l.innerText.toLowerCase();
    l.style.display = texto.includes(valor) ? "" : "none";
  });
}

function baixarExcel(){
  const ws = XLSX.utils.json_to_sheet(resultado);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Relatorio");
  XLSX.writeFile(wb, "conferencia.xlsx");
}
</script>

</body>
</html>

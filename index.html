<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Conferência de Manifestos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f6;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
}

.header img{
height:40px;
}

.header h1{
margin:0;
color:#0b4ea2;
}

.subtitle{
color:#64748b;
margin-bottom:25px;
}

.uploads{
display:flex;
gap:20px;
}

.box{
flex:1;
background:#f1f5f9;
padding:20px;
border-radius:10px;
}

.actions{
margin-top:25px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-right:10px;
}

.processar{background:#1976d2;color:white}
.baixar{background:#22a652;color:white}
.limpar{background:#64748b;color:white}

.status{
margin-top:15px;
font-weight:bold;
color:#0b4ea2;
}

.resumo{
display:flex;
gap:15px;
margin-top:20px;
margin-bottom:10px;
}

.card{
background:#f1f5f9;
padding:15px 20px;
border-radius:8px;
font-size:14px;
}

.card b{
font-size:20px;
}

.filtro{
margin-top:15px;
}

.filtro input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:260px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0b4ea2;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.erro{
color:#e11d48;
font-weight:bold;
}

.ok{
color:#22a652;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo-azulcargo.png">
<h1>Conferência de Manifestos</h1>
</div>

<div class="subtitle">
Manifesto PDF escaneado + EDI Excel + Capa / conferência física
</div>

<div class="uploads">

<div class="box">
<h3>Upload Manifestos (PDF)</h3>
<input type="file" id="manifestos" multiple>
</div>

<div class="box">
<h3>Upload Planilha EDI (Excel)</h3>
<input type="file" id="edi">
</div>

<div class="box">
<h3>Upload Capa / Conferência Física</h3>
<input type="file" id="capa">
</div>

</div>

<div class="actions">

<button class="processar" onclick="processar()">PROCESSAR CONFERÊNCIA</button>

<button class="baixar" onclick="baixarExcel()">Baixar Excel</button>

<button class="limpar" onclick="location.reload()">Limpar</button>

</div>

<div class="status" id="status"></div>

<div class="resumo">

<div class="card">
Manifesto<br>
<b id="totalManifesto">0</b>
</div>

<div class="card">
Emitido<br>
<b id="totalEmitido">0</b>
</div>

<div class="card">
Físico<br>
<b id="totalFisico">0</b>
</div>

</div>

<h3>Detalhamento por NF</h3>

<div class="filtro">

<input
type="text"
id="filtroNF"
placeholder="🔎 Buscar NF ou AWB..."
onkeyup="filtrarTabela()"
>

</div>

<table id="tabelaResultado">

<thead>
<tr>
<th>NF</th>
<th>Manifesto</th>
<th>Emitido</th>
<th>Apontada na Capa</th>
<th>AWB</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let manifesto=[]
let emitido=[]
let resultado=[]

async function processar(){

document.getElementById("status").innerText="Processando..."

manifesto=[]
emitido=[]
resultado=[]

let arquivosManifesto=document.getElementById("manifestos").files

for(let file of arquivosManifesto){

let texto=await lerPDF(file)

let nfs=texto.match(/\d{7,9}/g)

if(nfs)manifesto.push(...nfs)

}

manifesto=[...new Set(manifesto)]

document.getElementById("totalManifesto").innerText=manifesto.length

let arquivoEDI=document.getElementById("edi").files[0]

if(arquivoEDI){

const data=await arquivoEDI.arrayBuffer()

const workbook=XLSX.read(data)

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet)

json.forEach(l=>{

emitido.push({

nf:String(l.Numero),
awb:l["Nº AWB"] || ""

})

})

}

document.getElementById("totalEmitido").innerText=emitido.length
document.getElementById("totalFisico").innerText=manifesto.length

cruzar()

document.getElementById("status").innerText="Conferência concluída com sucesso."

}

function cruzar(){

let todas=[

...manifesto,
...emitido.map(e=>e.nf)

]

todas=[...new Set(todas)]

const tbody=document.querySelector("#tabelaResultado tbody")

tbody.innerHTML=""

todas.forEach(nf=>{

let noManifesto=manifesto.includes(nf)

let emi=emitido.find(e=>e.nf==nf)

let awb=emi?emi.awb:""

let status="OK"

if(!noManifesto && emi) status="FALTA NO MANIFESTO"
if(noManifesto && !emi) status="NAO EMITIDA"

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${nf}</td>
<td>${noManifesto?"SIM":"NAO"}</td>
<td>${emi?"SIM":"NAO"}</td>
<td>-</td>
<td>${awb}</td>
<td class="${status=="OK"?"ok":"erro"}">${status}</td>

`

tbody.appendChild(tr)

resultado.push({

NF:nf,
Manifesto:noManifesto,
Emitido:emi?"SIM":"NAO",
AWB:awb,
Status:status

})

})

}

async function lerPDF(file){

const reader=new FileReader()

return new Promise(resolve=>{

reader.onload=async function(){

const typedarray=new Uint8Array(this.result)

const pdf=await pdfjsLib.getDocument(typedarray).promise

let texto=""

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const viewport=page.getViewport({scale:2})

const canvas=document.createElement("canvas")

const ctx=canvas.getContext("2d")

canvas.height=viewport.height
canvas.width=viewport.width

await page.render({canvasContext:ctx,viewport:viewport}).promise

const ocr=await Tesseract.recognize(canvas)

texto+=ocr.data.text

}

resolve(texto)

}

reader.readAsArrayBuffer(file)

})

}

function filtrarTabela(){

const filtro=document.getElementById("filtroNF").value.toUpperCase()

const linhas=document.querySelectorAll("#tabelaResultado tbody tr")

linhas.forEach(l=>{

const nf=l.children[0].textContent
const awb=l.children[4].textContent

if(
nf.toUpperCase().includes(filtro) ||
awb.toUpperCase().includes(filtro)
){
l.style.display=""
}else{
l.style.display="none"
}

})

}

function baixarExcel(){

const ws=XLSX.utils.json_to_sheet(resultado)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Conferencia")

XLSX.writeFile(wb,"conferencia.xlsx")

}

</script>

</body>
</html>
